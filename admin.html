<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Enquiries</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 2rem;
            color: #1e293b;
        }
        
        .dashboard-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Glassmorphism Header */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1.5rem 2.5rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }
        
        .dashboard-header h1 {
            color: #0f172a;
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .dashboard-header h1 i {
            color: var(--primary);
        }

        /* Premium Stat Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            padding: 2rem;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: translate(30%, -30%);
        }

        .stat-card.primary {
            background: linear-gradient(135deg, var(--primary) 0%, #7a0000 100%);
            color: white;
        }
        
        .stat-card.secondary {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
        }
        
        .stat-card h3 {
            font-size: 1.1rem;
            font-weight: 500;
            opacity: 0.9;
            margin: 0 0 1rem 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
        }

        /* Elegant Table Section */
        .table-section {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .table-header h2 {
            margin: 0;
            color: #0f172a;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .enquiries-table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        
        .enquiries-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        .enquiries-table th {
            background: #f8fafc;
            color: #475569;
            padding: 1.2rem 1.5rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .enquiries-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            font-size: 1rem;
            vertical-align: middle;
        }
        
        .enquiries-table tr {
            transition: background 0.2s;
        }
        
        .enquiries-table tr:hover {
            background: #f8fafc;
        }
        
        .enquiries-table tr:last-child td {
            border-bottom: none;
        }

        /* Beautiful Buttons */
        .btn-premium {
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            border: none;
        }
        
        .btn-premium i {
            font-size: 1.1rem;
        }

        .btn-download {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: #475569;
            border: 2px solid #e2e8f0;
        }
        
        .btn-outline:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #0f172a;
        }
        
        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        /* Note Banner */
        .info-banner {
            margin-top: 3rem;
            background: rgba(245, 158, 11, 0.1);
            border-left: 4px solid #f59e0b;
            padding: 1.5rem;
            border-radius: 0 12px 12px 0;
            color: #b45309;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        
        .info-banner i {
            font-size: 1.5rem;
        }

        /* Utilities */
        .badge {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
        }
        
        .amount-highlight {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        
        <header class="dashboard-header">
            <h1><i class="ri-dashboard-3-line"></i> Admin Workspace</h1>
            <div style="display: flex; gap: 15px;">
                <a href="index.html" class="btn-premium btn-outline">
                    <i class="ri-arrow-left-line"></i> Back to Generator
                </a>
                <button id="downloadCsvBtn" class="btn-premium btn-download">
                    <i class="ri-download-cloud-2-line"></i> Export CSV
                </button>
            </div>
        </header>

        <div class="stats-cards">
            <div class="stat-card primary">
                <h3>Total Enquiries</h3>
                <div class="value" id="totalEnquiries">0</div>
            </div>
            <div class="stat-card secondary">
                <h3>Recent (Last 7 Days)</h3>
                <div class="value" id="recentEnquiries">0</div>
            </div>
        </div>

        <section class="table-section">
            <div class="table-header">
                <h2>Recent Enquiries</h2>
                <button id="clearDataBtn" class="btn-premium btn-danger">
                    <i class="ri-delete-bin-line"></i> Clear All Data
                </button>
            </div>
            
            <div class="enquiries-table-wrapper">
                <table class="enquiries-table">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Client Details</th>
                            <th>Contact Info</th>
                            <th>Total Amount</th>
                            <th style="text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="enquiriesBody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
                <div id="emptyState" style="display: none; text-align: center; padding: 4rem 2rem; color: #94a3b8;">
                    <i class="ri-inbox-line" style="font-size: 3rem; display: block; margin-bottom: 1rem; opacity: 0.5;"></i>
                    <h3 style="margin: 0; font-size: 1.2rem; font-weight: 500;">No enquiries found</h3>
                    <p style="margin: 0.5rem 0 0 0; font-size: 0.95rem;">When clients submit an enquiry, it will appear here.</p>
                </div>
            </div>
        </section>
        
    </div>

    <script src="admin.js"></script>
</body>
</html>
